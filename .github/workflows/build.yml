name: Build Jamil Contractor APKs
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Next.js Build
        run: npm run build

      # --- 1. WORKER APK BUILD ---
      - name: Build Worker APK
        run: |
          cp capacitor.config.worker.json capacitor.config.json || true
          npx cap add android || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../Jamil_Worker.apk

      # --- 2. ADMIN APK BUILD ---
      - name: Build Admin APK
        run: |
          cd ..
          rm -rf android
          cp capacitor.config.admin.json capacitor.config.json || true
          npx cap add android || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../Jamil_Admin.apk

      # --- 3. UPLOAD BOTH APKS ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Jamil-Contractor-Apps
          path: |
            Jamil_Worker.apk
            Jamil_Admin.apk
