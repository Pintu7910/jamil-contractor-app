name: Build Jamil Contractor APKs
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Next.js Build
        run: npm run build

      # --- WORKER & ADMIN APKS BUILD ---
      - name: Build APKs
        run: |
          # Sabse pehle purana android folder hata dena hai taaki koi purani file na bache
          rm -rf android
          
          # 1. WORKER BUILD
          cp capacitor.config.worker.json capacitor.config.json || true
          npx cap add android
          npx cap sync android
          
          # Force Resolution Strategy (Ye duplicate class ko jad se khatam karega)
          cd android
          echo "configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../Jamil_Worker.apk
          
          # 2. ADMIN BUILD
          cd ..
          rm -rf android
          cp capacitor.config.admin.json capacitor.config.json || true
          npx cap add android
          npx cap sync android
          
          cd android
          echo "configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../Jamil_Admin.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Jamil-Contractor-Apps
          path: |
            Jamil_Worker.apk
            Jamil_Admin.apk
